app = 'exsize-api-prod'
primary_region = 'fra'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/exsize.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'exsize_data'
  destination = '/data'
